polling_interval_seconds: 1
market_feed_enabled: true
market_feed_stale_seconds: 2.5
execution_mode: "paper"
dry_run: true

strategy_mode: "btc5m_orderbook"
strategy_entry_mode: "arb_micro"

bankroll: 10000.0
min_trade_amount: 5.0
min_price: 0.02
max_price: 0.98
slippage_limit: 0.03

strategy_trade_allocation_pct: 0.03
strategy_fixed_trade_amount: 0.0
strategy_min_seconds_into_window: 20
strategy_max_seconds_into_window: 260

max_position_per_market: 10000.0
max_total_exposure: 10000.0
max_daily_loss: 2500.0
max_daily_loss_pct: 0.25
profit_keep_ratio: 0.0

btc5m_reserve_enabled: false
btc5m_reserved_notional: 0.0
btc5m_reserved_allocation_pct: 0.0
btc5m_reserve_protected_pct: 0.0
btc5m_ignore_global_exposure_limit: true
btc5m_relaxed_risk: true

autonomous_decisions_enabled: false
manual_confirmation_enabled: false
telegram_execution_notifications_enabled: true
telegram_daily_summary_enabled: false

allowed_tags:
  - "crypto"
blocked_tags: []
